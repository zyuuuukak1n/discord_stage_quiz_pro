<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage Quiz - Audience View</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        display: ['Orbitron', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            100: '#cffafe',
                            400: '#22d3ee',
                            500: '#06b6d4',
                            900: '#164e63',
                        },
                        neon: {
                            gold: '#ffd700',
                            pink: '#ff007f',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050510;
            background-image: radial-gradient(circle at 50% 50%, #1a1a3a 0%, #000 100%);
            color: white;
            overflow: hidden; /* Fix layout for 1920x1080 */
            width: 1920px;
            height: 1080px;
            transform-origin: top left;
        }

        .typing-cursor::after {
            content: '█';
            animation: blink 1s step-end infinite;
            color: #22d3ee;
            margin-left: 4px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Neon Text Glow */
        .neon-text {
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.8), 0 0 20px rgba(34, 211, 238, 0.5);
        }

        /* Glassmorphism panel */
        .glass-panel {
            background: rgba(16, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(34, 211, 238, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* Popup animation for Answerer */
        .popup-anim {
            animation: popup 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: scale(0);
        }

        @keyframes popup {
            to { transform: scale(1); }
        }
    </style>
</head>
<body class="relative flex flex-col items-center justify-between p-12">
    <!-- Header / Title -->
    <header class="w-full flex justify-between items-start z-10">
        <div class="font-display font-black text-6xl text-transparent bg-clip-text bg-gradient-to-r from-brand-400 to-neon-gold tracking-widest neon-text">
            STAGE QUIZ BATTLE
        </div>
        
        <!-- Scoreboard Panel -->
        <div class="w-96 glass-panel rounded-2xl p-6 relative">
            <h2 class="font-display text-2xl text-brand-400 mb-4 border-b border-brand-900 pb-2">RANKING TOP 5</h2>
            <div id="rankingList" class="space-y-3 font-sans font-bold text-xl">
                <!-- User rankings injected by JS -->
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="w-full flex-1 flex flex-col items-center justify-center relative z-0 mt-[-100px]">
        <!-- Answerer Popup Highlight (Hidden by default) -->
        <div id="answererPopup" class="absolute inset-0 flex items-center justify-center z-50 hidden">
            <div class="glass-panel w-3/4 py-20 px-10 rounded-[3rem] border-4 border-neon-gold text-center popup-anim relative overflow-hidden">
                <div class="absolute inset-0 bg-neon-gold opacity-10 blur-xl"></div>
                <h3 class="font-display text-4xl text-brand-100 mb-4">ANSWER RIGHT NOW!</h3>
                <div id="answererName" class="font-sans font-black text-8xl text-neon-gold drop-shadow-[0_0_20px_rgba(255,215,0,0.8)]">
                    Participant Name
                </div>
            </div>
        </div>

        <!-- Question View -->
        <div class="w-11/12 max-w-7xl">
            <div class="glass-panel rounded-3xl p-16 shadow-[0_0_50px_rgba(6,182,212,0.2)]">
                <div class="text-3xl text-brand-400 mb-6 font-display">QUESTION</div>
                <div id="questionContainer" class="font-sans font-bold text-6xl leading-[1.6] tracking-wide text-white min-h-[300px]">
                    <span id="questionText">Waiting for next question...</span>
                </div>
                
                <div id="mediaContainer" class="mt-8 flex justify-center hidden">
                    <img id="questionMedia" src="" alt="Question Media" class="max-h-[400px] rounded-2xl border-2 border-brand-500 shadow-[0_0_30px_rgba(34,211,238,0.4)]">
                </div>
            </div>
        </div>
    </main>

    <!-- Footer / Timer -->
    <footer class="w-full pb-8 z-10 flex flex-col items-center">
        <!-- Visual Timer (Simulated for aesthetics) -->
        <div class="w-3/4 h-4 bg-brand-900 rounded-full overflow-hidden border border-brand-500 mb-2">
            <div id="timerBar" class="h-full bg-gradient-to-r from-brand-400 to-neon-gold w-full transition-all duration-1000 ease-linear"></div>
        </div>
        <div class="font-display text-brand-400 text-2xl tracking-widest" id="timerText">WAITING</div>
    </footer>

    <!-- WebSocket & Logic -->
    <script>
        // Use relative protocol to match server
        const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const wsUrl = `${wsProtocol}//${window.location.host}/ws/audience`;
        
        // Auto-reconnecting WebSocket
        let ws;
        function connectWebSocket() {
            ws = new WebSocket(wsUrl);
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                handleAction(data);
            };
            ws.onclose = function() {
                setTimeout(connectWebSocket, 1000);
            };
        }
        connectWebSocket();

        // Screen Scale to fit any window keeping 1920x1080 ratio
        function resizeScreen() {
            const scaleX = window.innerWidth / 1920;
            const scaleY = window.innerHeight / 1080;
            const scale = Math.min(scaleX, scaleY);
            
            const dx = (window.innerWidth - 1920 * scale) / 2;
            const dy = (window.innerHeight - 1080 * scale) / 2;
            
            document.body.style.transform = `translate(${dx}px, ${dy}px) scale(${scale})`;
        }
        window.addEventListener('resize', resizeScreen);
        resizeScreen();

        // ------------------
        // Core Logic
        // ------------------
        let fullQuestionText = "";
        let currentTypedIndex = 0;
        let isPaused = false;
        let typeInterval = null;

        const elQuestionText = document.getElementById("questionText");
        const elContainer = document.getElementById("questionContainer");
        const elAnswererPopup = document.getElementById("answererPopup");
        const elAnswererName = document.getElementById("answererName");
        const elTimerText = document.getElementById("timerText");

        function updateRanking(ranking) {
            const container = document.getElementById("rankingList");
            container.innerHTML = "";
            ranking.slice(0, 5).forEach((user, index) => {
                const colors = index === 0 ? "text-neon-gold" : (index === 1 ? "text-gray-300" : (index === 2 ? "text-orange-400" : "text-white"));
                const div = document.createElement("div");
                div.className = `flex justify-between items-center ${colors}`;
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="font-display text-sm opacity-70">0${index+1}</span>
                        <span class="truncate max-w-[200px]">${user.display_name}</span>
                    </div>
                    <div class="font-display tracking-wider">${user.score} pt</div>
                `;
                container.appendChild(div);
            });
        }

        function playSound(type) {
            // Placeholder: Could play sounds directly via Audio API if needed,
            // but requirements state Bot plays sound in Discord Stage channel.
            // Leaving here just in case UI sounds are desired.
        }

        function startTypingEffect() {
            if (typeInterval) clearInterval(typeInterval);
            elContainer.classList.add("typing-cursor");
            
            typeInterval = setInterval(() => {
                if (isPaused) return;

                if (currentTypedIndex < fullQuestionText.length) {
                    elQuestionText.innerText = fullQuestionText.substring(0, currentTypedIndex + 1);
                    currentTypedIndex++;
                } else {
                    clearInterval(typeInterval);
                    elContainer.classList.remove("typing-cursor");
                }
            }, 80); // Speed: 80ms per char
        }

        function handleAction(data) {
            console.log("WS Data received:", data);
            
            if (data.action === "SYNC_STATE") {
                updateRanking(data.ranking || []);
                if (data.state === "asking" || data.state === "paused") {
                    fullQuestionText = data.question_text;
                    elQuestionText.innerText = fullQuestionText; // Just show full text on sudden join
                    elContainer.classList.remove("typing-cursor");
                    
                    if (data.state === "paused" && data.answering_user_name) {
                        elAnswererName.innerText = data.answering_user_name;
                        elAnswererPopup.classList.remove("hidden");
                    }
                } else {
                    elQuestionText.innerText = "WAITING FOR NEXT QUESTION...";
                }
            }
            else if (data.action === "START_QUESTION") {
                fullQuestionText = data.question_text || "";
                elQuestionText.innerText = "";
                currentTypedIndex = 0;
                isPaused = false;
                elAnswererPopup.classList.add("hidden");
                startTypingEffect();
                
                elTimerText.innerText = "QUESTION IN PROGRESS...";
                
            }
            else if (data.action === "PAUSE_QUESTION" || data.action === "ANSWER_REQUEST") {
                isPaused = true;
                elContainer.classList.remove("typing-cursor");
                
                if (data.display_name) {
                    elAnswererName.innerText = data.display_name;
                    // Trigger reflow to restart animation
                    elAnswererPopup.classList.remove("hidden");
                    const pAnim = elAnswererPopup.querySelector('.popup-anim');
                    pAnim.style.animation = 'none';
                    pAnim.offsetHeight; /* trigger reflow */
                    pAnim.style.animation = null; 
                }
                
                elTimerText.innerText = "PAUSED";
            }
            else if (data.action === "RESUME_QUESTION") {
                isPaused = false;
                elAnswererPopup.classList.add("hidden");
                elContainer.classList.add("typing-cursor");
                elTimerText.innerText = "QUESTION IN PROGRESS...";
            }
            else if (data.action === "SHOW_ANSWER") {
                // Instantly show the rest of the question
                isPaused = false;
                currentTypedIndex = fullQuestionText.length;
                elQuestionText.innerText = fullQuestionText;
                clearInterval(typeInterval);
                elContainer.classList.remove("typing-cursor");
                elAnswererPopup.classList.add("hidden");
                elTimerText.innerText = "ANSWER REVEAL";
            }
            else if (data.action === "JUDGEMENT") {
                elAnswererPopup.classList.add("hidden");
                if (data.ranking) updateRanking(data.ranking);
                
                // Show Correct/Incorrect Effect temporarily
                const judgmentOverlay = document.createElement("div");
                judgmentOverlay.className = "fixed inset-0 z-[100] flex items-center justify-center pointer-events-none";
                const color = data.is_correct ? "text-green-500 border-green-500" : "text-red-500 border-red-500";
                const text = data.is_correct ? "CORRECT!" : "INCORRECT";
                
                judgmentOverlay.innerHTML = `
                    <div class="animate-bounce font-display font-black text-9xl ${color} 
                                bg-gray-900/90 py-10 px-20 rounded-[4rem] border-8 shadow-[0_0_100px_currentColor]">
                        ${text}
                    </div>
                `;
                document.body.appendChild(judgmentOverlay);
                setTimeout(() => judgmentOverlay.remove(), 3000);
                
                elTimerText.innerText = "WAITING";
            }
            else if (data.action === "RESET_STATE") {
                isPaused = false;
                clearInterval(typeInterval);
                elQuestionText.innerText = "WAITING FOR NEXT QUESTION...";
                elContainer.classList.remove("typing-cursor");
                elAnswererPopup.classList.add("hidden");
                elTimerText.innerText = "WAITING";
            }
        }
    </script>
</body>
</html>
